services:
  kappari-sync:
    build: .
    container_name: kappari-keep-sync
    restart: unless-stopped
    volumes:
      # Mount the Paprika database directory or file
      # Adjust the host path on the left side of the colon to point to your actual database location
      - type: bind
        source: ${LOCALAPPDATA:-C:\Users\mschm\AppData\Local}\Paprika Recipe Manager 3\Database\Paprika.sqlite
        target: /app/Database/Paprika.sqlite
        read_only: false
    environment:
      # You can also use a .env file and remove these environment variables here
      - KAPPARI_DB_FILE=/app/Database/Paprika.sqlite
      - KAPPARI_KEEP_EMAIL=${KAPPARI_KEEP_EMAIL}
      - KAPPARI_KEEP_APP_PASSWORD=${KAPPARI_KEEP_APP_PASSWORD}
      - KAPPARI_KEEP_LIST_TITLES=${KAPPARI_KEEP_LIST_TITLES:-Shopping List}
      - KAPPARI_SYNC_DAEMON_INTERVAL_MINUTES=${KAPPARI_SYNC_DAEMON_INTERVAL_MINUTES:-15}
